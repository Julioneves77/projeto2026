    <script type="text/javascript">
        // Aguarda o CSS estar carregado antes de iniciar o Clarity
        // Isso evita que o Clarity capture a página antes do CSS estar aplicado
        (function() {
            function initClarity() {
                // Verifica se há stylesheets carregados
                var hasStylesheets = document.styleSheets.length > 0;

                (function(c,l,a,r,i,t,y){

                })(window, document, "clarity", "script", "uwafq6fo78");
            }
            
            // Aguarda o evento load para garantir que todos os recursos estão carregados
            if (document.readyState === 'complete') {
                // Página já carregou completamente
                setTimeout(initClarity, 100);
            } else {
                // Aguarda o evento load
                window.addEventListener('load', function() {
                    setTimeout(initClarity, 100);

            }
        })();
